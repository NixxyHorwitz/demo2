<!DOCTYPE html>
<html lang="id">
<head>

        p { font-size: 16px; color: #7f8c8d; line-height: 1.6; }
        .line { height: 3px; width: 50px; background: #f39c12; margin: 20px auto; }

<body>
    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Dalam Pengembangan</h1>
        <div class="line"></div>
        <p>Mohon maaf atas ketidaknyamanannya. Saat ini halaman sedang dalam proses <strong>pengembangan dan perbaikan</strong> sistem untuk meningkatkan layanan kami.</p>
        <p>Silakan kembali lagi dalam beberapa saat.</p>
    </div>

</html>
